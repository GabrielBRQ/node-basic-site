<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Node.js basic site</title>
  <style>
    .button-nav {
      display: inline-block;
      padding: 10px 20px;
      margin-right: 10px;
      background-color: #333;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      font-family: sans-serif;
      font-weight: bold;
      transition: background-color 0.2s;
    }

    .button-nav:hover {
      background-color: #555;
    }

    nav {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  
  <nav>
    <a href="/" class="button-nav">Home</a>
    <a href="/about" class="button-nav">About</a>
    <a href="/contact-me" class="button-nav">Contact</a>
  </nav>

  <h1>About</h1>
  <h2>This is the About page!</h2>
</body>
</html>
